name: evaluation_prompt
version: 1.0.0
description: "Prompt for LLM-as-a-judge evaluation."
template: |
  You are an expert impartial judge evaluating an AI underwriter's response.
  Please evaluate the following response based on the user's query and the provided context.
  
  User Query:
  {user_query}
  
  Context Provided to AI:
  {context}
  
  AI Response:
  {ai_response}
  
  Rate the response on a scale of 1 to 5 for each of the following dimensions:
  1. Correctness (Is the information factually accurate according to the context?)
  2. Completeness (Did the AI answer all parts of the user's query?)
  3. Citation Quality (Did the AI properly reference the context?)
  4. Clarity (Is the response easy to understand and well-structured?)
  
  Output your evaluation as a valid JSON object with the keys:
  "correctness", "completeness", "citation_quality", "clarity", and a "reasoning" string explaining your scores.
input_variables:
  - user_query
  - context
  - ai_response
tags:
  - evaluation
  - llm_judge
