version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loan_underwriter_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./test_reports:/app/test_reports
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: loan_underwriter_ui
    ports:
      - "8501:8501"
    environment:
      # Use the docker internal network hostname instead of localhost
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

# Optional standalone Redis/Chroma services could be added here if not embedded.
